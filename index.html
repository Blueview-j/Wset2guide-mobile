<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>WSET Level 2 – Study Guide</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;1,400&display=swap');

:root {
  --bg:          #000000;
  --surface:     #111111;
  --surface-2:   #1A1A1A;
  --border:      #333333;
  --wine-deep:   #1A0000;
  --wine:        #3A0808;
  --wine-bright: #E05050;
  --wine-glow:   #FF8080;
  --wine-light:  #222222;
  --wine-pale:   #181818;
  --gold:        #E8A820;
  --gold-light:  #1A1400;
  --text:        #FFFFFF;
  --text-dim:    #AAAAAA;
  --dim:         #FFB8B8;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --header-h: 56px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html {
  font-size: 16px;
  color-scheme: dark;
  background-color: #000000;
}

body {
  font-family: 'Source Sans 3', Georgia, serif;
  background: #000000;
  color: #FFFFFF;
  min-height: 100vh;
  overscroll-behavior: none;
}

/* ── HEADER ── */
#header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: var(--wine-deep);
  height: calc(var(--header-h) + var(--safe-top));
  padding-top: var(--safe-top);
  display: flex;
  align-items: center;
  padding-left: 4px;
  padding-right: 12px;
  gap: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
}

#hamburger {
  background: none;
  border: none;
  color: #fff;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 8px;
  flex-shrink: 0;
  transition: background 0.15s;
}
#hamburger:active { background: rgba(255,255,255,0.15); }

#hamburger svg { width: 22px; height: 22px; }

#header-title {
  color: #fff;
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 600;
  flex: 1;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#search-btn {
  background: none;
  border: none;
  color: var(--dim);
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 8px;
  font-size: 20px;
  flex-shrink: 0;
  transition: background 0.15s;
}
#search-btn:active { background: rgba(255,255,255,0.15); }

#font-btns {
  display: flex;
  gap: 2px;
  flex-shrink: 0;
}
.font-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.18);
  color: #fff;
  border-radius: 7px;
  width: 36px;
  height: 34px;
  font-size: 12px;
  font-weight: 700;
  font-family: 'Source Sans 3', sans-serif;
  cursor: pointer;
  transition: background 0.15s;
  letter-spacing: -0.02em;
}
.font-btn:active { background: rgba(255,255,255,0.25); }

/* ── DRAWER OVERLAY ── */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  backdrop-filter: blur(2px);
}
#overlay.open { display: block; }

/* ── DRAWER ── */
#drawer {
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  width: 280px;
  max-width: 85vw;
  background: var(--wine);
  z-index: 300;
  transform: translateX(-100%);
  transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#drawer.open { transform: translateX(0); }

#drawer-header {
  background: var(--wine-deep);
  padding: 16px 18px;
  padding-top: calc(16px + var(--safe-top));
  flex-shrink: 0;
}
#drawer-header h2 {
  color: #fff;
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  font-weight: 600;
}
#drawer-header p {
  color: var(--dim);
  font-size: 12px;
  margin-top: 2px;
  font-family: 'Source Sans 3', sans-serif;
}

#drawer-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0 16px;
  -webkit-overflow-scrolling: touch;
}

.drawer-section-label {
  padding: 12px 18px 4px;
  color: var(--dim);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  font-family: 'Source Sans 3', sans-serif;
  text-transform: uppercase;
}

.ch-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 11px 18px;
  background: transparent;
  color: rgba(255,255,255,0.9);
  border: none;
  cursor: pointer;
  font-size: 13.5px;
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 400;
  text-align: left;
  line-height: 1.35;
  min-height: 44px;
  transition: background 0.1s;
}
.ch-btn:active { background: var(--wine-mid); }
.ch-btn.active { background: var(--wine-bright); font-weight: 600; }
.ch-btn .icon { font-size: 16px; flex-shrink: 0; width: 22px; }

.drawer-divider { height: 1px; background: var(--wine-deep); margin: 6px 18px; }

/* ── MAIN CONTENT ── */
#content {
  margin-top: calc(var(--header-h) + var(--safe-top));
  padding: 20px 16px calc(24px + var(--safe-bottom));
  min-height: 100vh;
}

/* ── SEARCH OVERLAY ── */
#search-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 400;
  flex-direction: column;
}
#search-overlay.open { display: flex; }

#search-bar {
  background: var(--wine-deep);
  padding: 8px 12px;
  padding-top: calc(8px + var(--safe-top));
  display: flex;
  align-items: center;
  gap: 10px;
}

#search-input {
  flex: 1;
  background: rgba(255,255,255,0.12);
  border: none;
  border-radius: 8px;
  padding: 9px 14px;
  color: #fff;
  font-size: 15px;
  font-family: 'Source Sans 3', sans-serif;
  outline: none;
}
#search-input::placeholder { color: rgba(255,255,255,0.45); }
#search-input:focus { background: rgba(255,255,255,0.18); }

#search-cancel {
  background: none;
  border: none;
  color: var(--dim);
  font-size: 15px;
  font-family: 'Source Sans 3', sans-serif;
  cursor: pointer;
  padding: 8px 4px;
  white-space: nowrap;
}

#search-results {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px calc(12px + var(--safe-bottom));
  -webkit-overflow-scrolling: touch;
}

#search-placeholder {
  color: var(--text-dim);
  text-align: center;
  margin-top: 48px;
  font-size: 15px;
  font-family: 'Source Sans 3', sans-serif;
}

.srch-item {
  padding: 13px 16px;
  margin-bottom: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  font-family: 'Source Sans 3', sans-serif;
  display: flex;
  justify-content: space-between;
  align-items: center;
  min-height: 52px;
  transition: background 0.1s;
}
.srch-item:active { background: var(--wine-light); }
.srch-name { font-size: 14px; font-weight: 600; flex: 1; margin-right: 10px; }
.srch-dest { color: var(--wine-glow); font-size: 12px; flex-shrink: 0; }

/* ── INDEX VIEW ── */
#index-view { display: none; }
#index-view h1 { color: var(--wine-glow); font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 800; margin-bottom: 6px; }
#index-subtitle { color: var(--text-dim); font-size: 13px; font-family: 'Source Sans 3', sans-serif; margin-bottom: 16px; }

#index-filter-wrap {
  display: flex;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0 12px;
  margin-bottom: 16px;
}
#index-filter-wrap span { color: var(--text-dim); margin-right: 8px; font-size: 15px; }
#index-filter {
  flex: 1;
  border: none;
  outline: none;
  padding: 11px 0;
  font-size: 15px;
  font-family: 'Source Sans 3', sans-serif;
  background: transparent;
  color: var(--text);
}
#index-clear-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  padding: 4px;
}

#index-list { display: flex; flex-direction: column; gap: 4px; }

.idx-item {
  padding: 12px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  min-height: 48px;
  transition: background 0.1s;
}
.idx-item:active { background: var(--wine-light); }
.idx-dest { color: var(--wine-glow); font-size: 11px; margin-left: 8px; flex-shrink: 0; }

/* ── CHAPTER CONTENT ── */
#chapter-view {}

.ch-h1 {
  color: var(--wine-glow);
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 800;
  margin: 0 0 16px;
  line-height: 1.2;
}

.ch-h2 {
  color: #FF8A8A;
  font-family: 'Playfair Display', serif;
  font-size: 19px;
  font-weight: 600;
  margin: 22px 0 8px;
  border-bottom: 2px solid var(--wine-light);
  padding-bottom: 5px;
}

.ch-h3 {
  color: #F0C8C8;
  font-size: 15px;
  font-weight: 600;
  font-family: 'Source Sans 3', sans-serif;
  margin: 14px 0 5px;
}

.ch-body {
  font-size: 15px;
  line-height: 1.75;
  color: var(--text);
  margin: 0 0 10px;
}

.ch-bullet {
  display: flex;
  font-size: 14.5px;
  line-height: 1.65;
  margin: 4px 0;
  color: var(--text);
}
.ch-bullet .dot {
  color: var(--wine-glow);
  font-weight: 800;
  margin-right: 10px;
  flex-shrink: 0;
  margin-top: 1px;
}

.ch-note {
  background: var(--gold-light);
  border: 1px solid #5A4000;
  border-left: 4px solid var(--gold);
  border-radius: 8px;
  padding: 13px 15px;
  margin: 16px 0;
  color: #F0D080;
  font-size: 13.5px;
  line-height: 1.75;
  white-space: pre-line;
  font-style: italic;
  font-family: 'Source Sans 3', sans-serif;
}

/* ── TABLES ── */
.table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: 10px -4px 14px;
  border-radius: 8px;
  box-shadow: 0 1px 6px rgba(107,16,16,0.1);
}

.ch-table {
  width: 100%;
  min-width: 320px;
  border-collapse: collapse;
  font-size: 13px;
  font-family: 'Source Sans 3', sans-serif;
}
.ch-table th {
  background: var(--wine-bright);
  color: #fff;
  padding: 8px 12px;
  text-align: left;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.03em;
  white-space: nowrap;
}
.ch-table th:first-child { border-radius: 8px 0 0 0; }
.ch-table th:last-child { border-radius: 0 8px 0 0; }
.ch-table td {
  padding: 7px 12px;
  border-top: 1px solid #3A1818;
  line-height: 1.5;
  vertical-align: top;
  color: var(--text);
}
.ch-table tr:nth-child(odd) td { background: #161616; }
.ch-table tr:nth-child(even) td { background: #0D0D0D; }
.ch-table tr:last-child td:first-child { border-radius: 0 0 0 8px; }
.ch-table tr:last-child td:last-child { border-radius: 0 0 8px 0; }

/* ── FADE IN ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: none; }
}
.fade-in { animation: fadeUp 0.25s ease both; }

/* ── CHAPTER CARD INTRO ── */
.ch-intro-card {
  background: linear-gradient(135deg, var(--wine-deep) 0%, var(--wine) 100%);
  border-radius: 12px;
  padding: 18px 18px 16px;
  margin-bottom: 20px;
  color: #fff;
}
.ch-intro-card .icon { font-size: 28px; margin-bottom: 6px; display: block; }
.ch-intro-card h2 { font-family: 'Playfair Display', serif; font-size: 13px; font-weight: 600; opacity: 0.7; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }

/* ── HOME / INDEX ── */
.home-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 16px;
}
.home-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 12px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.home-card:active { background: var(--wine-light); transform: scale(0.97); }
.home-card .hc-icon { font-size: 24px; margin-bottom: 6px; }
.home-card .hc-num { font-size: 10px; color: var(--wine-glow); font-weight: 700; letter-spacing: 0.06em; font-family: 'Source Sans 3', sans-serif; text-transform: uppercase; margin-bottom: 2px; }
.home-card .hc-title { font-size: 12.5px; font-weight: 600; font-family: 'Source Sans 3', sans-serif; color: var(--text); line-height: 1.3; }

.home-header { margin-bottom: 6px; }
.home-header h1 { font-family: 'Playfair Display', serif; color: var(--wine-glow); font-size: 28px; font-weight: 800; line-height: 1.1; }
.home-header p { color: var(--text-dim); font-size: 13px; font-family: 'Source Sans 3', sans-serif; margin-top: 6px; line-height: 1.5; }

.index-bar-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  background: var(--wine);
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 14px 18px;
  cursor: pointer;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 15px;
  font-weight: 600;
  margin-top: 12px;
  margin-bottom: 4px;
  min-height: 52px;
  transition: background 0.15s;
}
.index-bar-btn:active { background: var(--wine-bright); }
.index-bar-btn span { font-size: 20px; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <button id="hamburger" onclick="toggleDrawer()" aria-label="Menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <div id="header-title">🍷 WSET Level 2</div>
  <div id="font-btns">
    <button class="font-btn" onclick="changeFontSize(-1)" aria-label="Decrease font size">A−</button>
    <button class="font-btn" onclick="changeFontSize(1)"  aria-label="Increase font size">A+</button>
  </div>
  <button id="search-btn" onclick="openSearch()" aria-label="Search">🔍</button>
</div>

<!-- DRAWER OVERLAY -->
<div id="overlay" onclick="closeDrawer()"></div>

<!-- DRAWER -->
<div id="drawer">
  <div id="drawer-header">
    <h2>🍷 WSET Level 2</h2>
    <p>Interactive Study Guide</p>
  </div>
  <nav id="drawer-nav">
    <div class="drawer-section-label">Start</div>
    <button class="ch-btn active" id="btn-home" onclick="showHome(); closeDrawer()">
      <span class="icon">🏠</span> Home
    </button>
    <div class="drawer-divider"></div>
    <div class="drawer-section-label">Chapters</div>
    <!-- injected by JS -->
    <div class="drawer-divider"></div>
    <button class="ch-btn" id="btn-index" onclick="showIndex(); closeDrawer()">
      <span class="icon">📑</span> A–Z Index
    </button>
  </nav>
</div>

<!-- SEARCH OVERLAY -->
<div id="search-overlay">
  <div id="search-bar">
    <input id="search-input" type="search" placeholder="Search topics…" autocomplete="off" oninput="doSearch()" autofocus>
    <button id="search-cancel" onclick="closeSearch()">Cancel</button>
  </div>
  <div id="search-results">
    <p id="search-placeholder">Type to search all chapters…</p>
  </div>
</div>

<!-- MAIN -->
<main id="content">
  <div id="home-view"></div>
  <div id="chapter-view" style="display:none"></div>
  <div id="index-view" style="display:none">
    <h1>A – Z Index</h1>
    <p id="index-subtitle">Tap any term to go to its chapter.</p>
    <div id="index-filter-wrap">
      <span>🔍</span>
      <input id="index-filter" type="text" placeholder="Filter terms…" oninput="filterIndex()" autocomplete="off">
      <button id="index-clear-btn" onclick="clearIndexFilter()">✕</button>
    </div>
    <div id="index-list"></div>
  </div>
</main>

["bullet","Altitude: higher = cooler temperatures, good for preserving acidity."],
["bullet","Proximity to water: rivers and lakes moderate temperature extremes."],
["h2","Soil"],
["bullet","Well-drained soils (gravel, chalk, slate) force vines to search deep for water → concentration and character."],
["bullet","Fertile, moisture-retaining soils produce high yields of dilute, less complex wine."],
["table_h","Soil Type|Where Notable|Effect"],
["table_r","Gravel|Médoc (Bordeaux)|Excellent drainage, heat retention"],
["table_r","Chalk|Champagne, Chablis|Good drainage, high acidity retained"],
["table_r","Slate|Mosel (Germany)|Heat retention → ripeness in cool climate"],
["table_r","Limestone|Burgundy|Moderate drainage, adds minerality"],
["table_r","Volcanic|Southern Italy|Mineral character, good drainage"],
["table_r","Clay|Pomerol (Bordeaux)|Moisture retention → plump Merlot"],
["h2","Viticulture Decisions"],
["h3","Yield Management"],
["bullet","Lower yields generally produce MORE CONCENTRATED, higher-quality wine."],
["bullet","Yield controlled by: pruning (fewer buds), green harvesting (removing bunches), vine age (older vines naturally produce less)."],
["h3","Organic & Biodynamic Viticulture"],
["bullet","Organic: no synthetic pesticides or herbicides."],
["bullet","Biodynamic: holistic philosophy treating vineyard as a living ecosystem; follows lunar/cosmic calendar."],
["h3","Harvest Decisions"],
["bullet","Hand harvesting: essential on steep slopes, for Botrytis-affected grapes, or when whole bunches needed."],
["bullet","Machine harvesting: more efficient and cheaper; only possible on flat terrain."],
["h2","Vine Hazards"],
["bullet","FROST: spring frosts can kill young shoots. Methods: heaters, wind machines, water sprinklers, smudge pots."],
["bullet","RAIN at harvest: dilutes grapes; can cause rot."],
["bullet","DROUGHT: moderate stress concentrates flavours; excess kills vines."],
["bullet","DISEASE: powdery mildew, downy mildew, botrytis (beneficial for sweet wines)."],
["note","🔑 KEY FACTS\n• Diurnal range (hot days, cool nights) = preserves acidity AND allows full ripening.\n• Old vines → lower yields → more concentrated wine.\n• Well-drained soil → vines stressed → better quality fruit.\n• Gravel = Médoc; Chalk = Champagne/Chablis; Slate = Mosel."]]},
ch3:{title:"3. Making Still Wine",icon:"🏭",content:[
["h1","Chapter 3 – Making Still Wine"],
["body","Winemaking converts grape juice into wine. The decisions made in the winery are as important as what happens in the vineyard."],
["h2","Making White Wine"],
["table_h","Step|Detail"],
["table_r","Harvesting|Grapes picked at optimum ripeness."],
["table_r","Crushing|Berries broken open to release juice."],
["table_r","Pressing|Juice separated from skins immediately."],
["table_r","Settling|Juice left to clarify (solids sink)."],
["table_r","Fermentation|Yeast added; sugar → alcohol + CO₂."],
["table_r","Stabilisation|Wine clarified, filtered, prepared for bottling."],
["table_r","Bottling|Sealed with cork, screwcap, or crown cap."],
["h3","Fermentation Vessels"],
["bullet","STAINLESS STEEL TANK: preserves fresh, crisp fruit character. Used for Sauvignon Blanc, Pinot Grigio, Riesling."],
["bullet","OAK BARREL (fermented): adds texture, complexity, and subtle oak flavours. Used for premium Chardonnay."],
["h3","Malolactic Fermentation (MLF)"],
["bullet","A SECONDARY fermentation where tart MALIC ACID converts to softer LACTIC ACID."],
["bullet","Effect: REDUCES acidity; adds CREAMY, BUTTERY texture."],
["bullet","Used in: most red wines, and some fuller-bodied whites (e.g. oaked Chardonnay)."],
["bullet","AVOIDED in: crisp whites like Sauvignon Blanc, Riesling — would lose freshness."],
["h3","Bâtonnage (Lees Stirring)"],
["bullet","Stirring of dead yeast cells back into the wine during maturation."],
["bullet","Effect: adds creamy texture, complexity, and body. Used in white Burgundy, Muscadet sur Lie."],
["h2","Making Red Wine"],
["table_h","Step|Detail"],
["table_r","Destemming|Stalks removed (usually). Whole bunch = stems kept."],
["table_r","Crushing|Berries broken; juice + skins enter fermentation vessel."],
["table_r","Fermentation|Skins remain in contact during fermentation."],
["table_r","Maceration|Extended skin contact extracts colour, tannin, flavour."],
["table_r","Draining/Pressing|Free-run wine drained off; skins pressed."],
["table_r","Maturation|In oak barrels or stainless steel."],
["table_r","Bottling|After maturation and blending."],
["h3","Extraction Techniques"],
["bullet","PUMPING OVER (Remontage): pumping liquid from base over the cap of skins."],
["bullet","PUNCHING DOWN (Pigeage): pushing the cap of skins down into the liquid."],
["bullet","Longer maceration = more TANNIN and COLOUR extracted."],
["h2","Making Rosé Wine"],
["bullet","SAIGNÉE ('bleeding'): juice bled off early in red wine fermentation."],
["bullet","DIRECT PRESSING: black grapes pressed immediately, like white wine; most common for quality dry rosé."],
["bullet","BLENDING: mixing white and red wine (only permitted for Champagne rosé)."],
["note","🔑 KEY WINEMAKING DECISIONS\n• MLF: YES = creamy, lower acid (oaked Chardonnay). NO = fresh, high acid (Riesling).\n• Oak ferment: adds complexity to whites. Steel: preserves freshness.\n• Long maceration: more colour and tannin in red wines.\n• Bâtonnage (lees stirring): adds richness and texture."]]},
ch4:{title:"4. Sparkling & Fortified",icon:"🥂",content:[
["h1","Chapter 4 – Sparkling and Fortified Wine Production"],
["h2","How Sparkling Wine Gets Its Bubbles"],
["body","CO₂ from a SECOND fermentation is trapped in the wine, creating the fizz."],
["h3","Traditional Method (Méthode Traditionnelle)"],
["bullet","Base wine made first. Yeast + sugar (liqueur de tirage) added → SECOND fermentation IN THE BOTTLE, trapping CO₂."],
["bullet","Wine ages on LEES (dead yeast cells) in bottle → YEASTY, BISCUITY, TOASTY character."],
["bullet","RIDDLING (Remuage): bottles gradually tilted so lees collect in neck."],
["bullet","DISGORGEMENT: frozen neck ejected, removing lees."],
["bullet","DOSAGE: small amount of wine + sugar added to adjust final sweetness level."],
["bullet","Examples: Champagne, Crémant (France), Cava (Spain), Franciacorta (Italy)."],
["h3","Tank Method (Charmat / Cuve Close)"],
["bullet","Second fermentation happens in a SEALED PRESSURISED TANK, not individual bottles."],
["bullet","Cheaper; preserves FRESH FRUITY aromas rather than yeasty complexity."],
["bullet","Example: Prosecco (Italy)."],
["h3","Injection Method (Carbonation)"],
["bullet","CO₂ pumped directly into wine. Simplest and cheapest. Used for basic sparkling wines."],
["h2","Champagne Sweetness Scale"],
["table_h","Label Term|Residual Sugar (g/L)|Taste"],
["table_r","Brut Nature|0–3|Bone dry"],
["table_r","Extra Brut|0–6|Very dry"],
["table_r","Brut|0–12|Dry (most common)"],
["table_r","Extra Dry|12–17|Off-dry"],
["table_r","Sec|17–32|Medium"],
["table_r","Demi-Sec|32–50|Medium-sweet"],
["table_r","Doux|50+|Sweet"],
["h2","Making Fortified Wine"],
["body","Fortified wines have a neutral grape spirit (brandy) added to raise the alcohol to 15–22% abv."],
["h3","Port — Spirit Added DURING Fermentation"],
["bullet","Spirit added DURING fermentation → kills yeast → retains RESIDUAL SUGAR → sweet wine."],
["h3","Sherry — Spirit Added AFTER Fermentation"],
["bullet","Wine ferments fully to DRY before spirit is added. Base wine is DRY."],
["h2","Sherry Styles"],
["bullet","FLOR: a layer of protective yeast on Fino and Manzanilla Sherry, preventing oxidation; gives nutty/almond character."],
["bullet","SOLERA SYSTEM: fractional blending of wines from different years in a series of barrels."],
["table_h","Sherry Style|Description"],
["table_r","Fino|Pale, dry, nutty, protected by flor"],
["table_r","Manzanilla|Like Fino but from Sanlúcar; sea-salty character"],
["table_r","Amontillado|Fino where flor dies; aged oxidatively; nutty, amber"],
["table_r","Oloroso|No flor; fully oxidative ageing; rich, dark, dry to medium"],
["table_r","Cream|Sweetened Oloroso; dark, sweet, rich"],
["table_r","Pedro Ximénez|From dried PX grapes; intensely sweet, dark, raisiny"],
["note","🔑 KEY FACTS\n• Traditional Method = bottle fermentation = yeasty/biscuity complexity.\n• Tank Method = Prosecco = fresh, fruity, no yeast complexity.\n• Port: spirit added DURING fermentation → sweet.\n• Sherry: spirit added AFTER fermentation → base is dry.\n• Brut (0–12 g/L) = most common Champagne style."]]},
ch5:{title:"5. WSET Level 2 SAT",icon:"👃",content:[
["h1","Chapter 5 – WSET Level 2 Systematic Approach to Tasting®"],
["body","The WSET Level 2 SAT provides a structured framework for assessing and describing any wine with consistency."],
["h2","SAT Structure Overview"],
["table_h","Section|What to Assess"],
["table_r","APPEARANCE|Clarity · Intensity · Colour"],
["table_r","NOSE|Condition · Intensity · Aroma Characteristics · Development"],
["table_r","PALATE|Sweetness · Acidity · Tannin · Alcohol · Body · Flavour Intensity · Flavour Characteristics · Finish"],
["table_r","CONCLUSIONS|Quality Level · Readiness for Drinking/Potential"],
["h2","1. Appearance"],
["h3","Clarity"],
["bullet","Clear (no haziness) or Hazy (possible fault — unless intentional, e.g. unfiltered)."],
["h3","Colour — Whites"],
["table_h","Colour|Suggests"],
["table_r","Lemon-green|Young, cool climate, unoaked (e.g. Sauvignon Blanc)"],
["table_r","Lemon|Young to medium age"],
["table_r","Gold|Oaked, sweet, or with some age"],
["table_r","Amber/Brown|Old, heavily oxidised, or deliberately oxidative"],
["h3","Colour — Reds"],
["table_h","Colour|Suggests"],
["table_r","Purple|Young wine"],
["table_r","Ruby|Young to medium age"],
["table_r","Garnet|Medium age"],
["table_r","Tawny|Old, or deliberately oxidative ageing (Tawny Port)"],
["table_r","Brown|Very old or faulty"],
["h2","2. Nose — Faults & Aroma Development"],
["h3","Common Wine Faults"],
["table_h","Fault|Cause|Aroma"],
["table_r","Cork taint (TCA)|Contaminated cork|Musty, wet cardboard"],
["table_r","Oxidation|Too much oxygen exposure|Sherry-like, stale, flat"],
["table_r","Reduction|Too little oxygen|Struck match, rubber, garlic"],
["table_r","Volatile Acidity|Excess acetic acid|Vinegar, nail-polish remover"],
["h3","Aroma Development"],
["bullet","PRIMARY aromas: from the grape itself — fruit, flowers, herbaceous character."],
["bullet","SECONDARY aromas: from fermentation — bread dough, butter (MLF), cream."],
["bullet","TERTIARY aromas (Bouquet): from ageing — vanilla, toast, leather, earth, mushroom, dried fruit, tobacco, honey."],
["h2","3. Palate — Assessment Order"],
["table_h","Element|Scale|Detection"],
["table_r","Sweetness|Dry · Off-dry · Medium-dry · Medium-sweet · Sweet · Luscious|Tip of tongue"],
["table_r","Acidity|Low · Med(-) · Med · Med(+) · High|Mouth-watering"],
["table_r","Tannin (reds)|Low · Med(-) · Med · Med(+) · High|Drying/grippy"],
["table_r","Alcohol|Low (<11%) · Med (11–13.9%) · High (14%+)|Warming, throat"],
["table_r","Body|Light · Med(-) · Med · Med(+) · Full|Overall weight"],
["table_r","Finish|Short (<3s) · Med (3–5s) · Long (5–10s) · Very Long (10s+)|Duration after swallow"],
["h2","4. Conclusions"],
["bullet","Quality Level: Faulty · Poor · Acceptable · Good · Very Good · Outstanding"],
["bullet","Readiness: Too young / Drink now / Can continue to develop / Tired / Too old"],
["note","🔑 SAT MEMORY ORDER\n A → N → P → C\n APPEARANCE → NOSE → PALATE → CONCLUSIONS\n Palate order: Sweetness · Acidity · Tannin · Alcohol · Body · Intensity · Finish\n Long finish + complexity + balance = high quality"]]},
ch6:{title:"6. France: Bordeaux",icon:"🇫🇷",content:[
["h1","Chapter 6 – France: Bordeaux and the Southwest"],
["body","Bordeaux is the world's most famous wine region, producing large volumes of high-quality red, dry white, and sweet white wine."],
["h2","Key Facts"],
["bullet","Climate: MARITIME — moderated by Atlantic Ocean; warm summers, risk of autumn rain."],
["bullet","Most wines are BLENDS of multiple grape varieties."],
["h2","Red Bordeaux — Left Bank vs. Right Bank"],
["table_h","Bank|Dominant Grape|Soil|Style"],
["table_r","Left Bank|Cabernet Sauvignon|Gravel|High tannin, cedar, blackcurrant, full body; ages well"],
["table_r","Right Bank|Merlot|Clay/limestone|Softer, plummy, rounder tannin"],
["h3","Key Left Bank Appellations"],
["bullet","MÉDOC / HAUT-MÉDOC: home to most famous châteaux. Soil: gravel. Cab Sauv dominant."],
["bullet","PAUILLAC: First Growths include Châteaux Lafite, Latour, Mouton Rothschild."],
["bullet","MARGAUX: elegant, perfumed Cab Sauv; First Growth: Château Margaux."],
["bullet","GRAVES / PESSAC-LÉOGNAN: south of city; good reds AND dry whites."],
["h3","Key Right Bank Appellations"],
["bullet","SAINT-ÉMILION: Merlot dominant; First Growth: Château Ausone."],
["bullet","POMEROL: Merlot on clay; no official classification; home to Pétrus."],
["h2","1855 Classification"],
["bullet","Official classification of LEFT BANK châteaux from 1855."],
["bullet","Five levels: Premier Cru (First Growth) to Cinquième Cru (Fifth Growth)."],
["bullet","Only Mouton Rothschild has been promoted (1973). Classification rarely changes."],
["h2","White Bordeaux"],
["h3","Dry White Bordeaux"],
["bullet","Grapes: Sauvignon Blanc + Sémillon blend. Best from Pessac-Léognan."],
["bullet","Entre-Deux-Mers: dry, crisp, unoaked Sauvignon Blanc; good value."],
["h3","Sweet White Bordeaux"],
["bullet","SAUTERNES & BARSAC: Sémillon + Sauvignon Blanc affected by BOTRYTIS CINEREA (Noble Rot) → concentrated honey, apricot, marmalade flavours."],
["bullet","Château d'Yquem: Premier Cru Supérieur; most prestigious Sauternes."],
["h2","Southwest France"],
["table_h","Region|Key Grapes|Style"],
["table_r","Bergerac|Bordeaux varieties|Red, dry white, sweet white"],
["table_r","Cahors|Malbec (Côt/Auxerrois)|'Black Wine' — tannic red"],
["table_r","Madiran|Tannat|Very tannic red"],
["table_r","Jurançon|Gros/Petit Manseng|Dry & sweet white"],
["note","🔑 BORDEAUX KEY FACTS\n• Left Bank = Cab Sauv dominant; Right Bank = Merlot dominant.\n• Pomerol is on the Right Bank; NOT in the 1855 Classification.\n• Sauternes = Botrytis affected; Sémillon dominant.\n• Entre-Deux-Mers = dry white only; good value.\n• Cahors = Malbec (tannic, 'black wine')."]]},
ch7:{title:"7. France: Burgundy",icon:"🇫🇷",content:[
["h1","Chapter 7 – France: Burgundy and Beaujolais"],
["h2","Burgundy (Bourgogne)"],
["body","Burgundy produces the world's most famous Pinot Noir (reds) and Chardonnay (whites). Climate is CONTINENTAL — cool, with significant vintage variation."],
["h2","Burgundy Classification"],
["table_h","Level|Description"],
["table_r","Regional AOC|E.g. Bourgogne Rouge/Blanc — entry level"],
["table_r","Village AOC|E.g. Gevrey-Chambertin, Meursault"],
["table_r","Premier Cru|Specific named vineyard within a village"],
["table_r","Grand Cru|Finest individual vineyards; own AOC — HIGHEST LEVEL"],
["h2","Sub-Regions (North to South)"],
["h3","Chablis"],
["bullet","Northernmost part; COOL climate → high acidity, lean body, citrus, green apple."],
["bullet","Grape: Chardonnay ONLY. Typically UNOAKED; mineral (chalky)."],
["bullet","4 levels: Petit Chablis → Chablis → Premier Cru → Grand Cru."],
["h3","Côte d'Or"],
["bullet","CÔTE DE NUITS (north): predominantly RED (Pinot Noir). Grand Crus: Chambertin, Romanée-Conti."],
["bullet","CÔTE DE BEAUNE (south): RED and WHITE. Famous white villages: Meursault, Puligny-Montrachet, Chassagne-Montrachet."],
["h3","Côte Chalonnaise & Mâconnais"],
["bullet","Côte Chalonnaise: Rully, Mercurey, Givry, Montagny."],
["bullet","Mâconnais: Pouilly-Fuissé (best quality) and Mâcon-Villages (good value Chardonnay)."],
["h2","Key White Burgundy Styles"],
["table_h","Appellation|Style"],
["table_r","Chablis (unoaked)|Crisp, high acid, mineral, lemon, green apple"],
["table_r","Meursault|Rich, oaked, buttery, hazelnut, peachy"],
["table_r","Puligny-Montrachet|Elegant, mineral, oaked, great complexity"],
["table_r","Pouilly-Fuissé|Full, oaked Chardonnay; rich stone fruit"],
["table_r","Mâcon-Villages|Lighter, unoaked or lightly oaked, good value"],
["h2","Beaujolais"],
["bullet","South of Mâconnais. Grape: GAMAY (not Pinot Noir — important exam point!)."],
["bullet","Style: light body, low tannin, high acidity, red cherry, raspberry, floral."],
["bullet","Production method: CARBONIC MACERATION (whole bunches in CO₂ atmosphere) → especially fruity, low tannin."],
["table_h","Level|Detail"],
["table_r","Beaujolais|Entry level; light, simple, fruity"],
["table_r","Beaujolais Villages|38 villages; slightly more body and depth"],
["table_r","Beaujolais Crus|10 named crus (e.g. Moulin-à-Vent, Morgon, Fleurie); most complex; can age"],
["body","BEAUJOLAIS NOUVEAU: Released 3rd Thursday of November each year. Light, fruity, drink immediately."],
["note","🔑 KEY BURGUNDY FACTS\n• Chablis = unoaked Chardonnay; very high acid, mineral.\n• Côte de Nuits = Pinot Noir. Côte de Beaune = Pinot Noir + Chardonnay.\n• Beaujolais = GAMAY (not Pinot Noir).\n• Beaujolais Crus: Moulin-à-Vent, Morgon, Fleurie are the most important.\n• Grand Cru is the HIGHEST quality level in Burgundy."]]},

["table_r","Condrieu|Viognier 100%|Aromatic white; peach, apricot, floral"],

["table_r","Pinot Gris|Rich, full body, smoky, stone fruit"],
["table_r","Muscat|Dry; grape and floral aromas"],
["bullet","VENDANGE TARDIVE (VT): late harvest; rich, often sweet."],
["bullet","SÉLECTION DE GRAINS NOBLES (SGN): botrytis-affected; intensely sweet."],

["table_h","Region|Wine Style|Key Grape"],

["note","🔑 KEY FACTS\n• N. Rhône = Syrah/Viognier; single varieties. S. Rhône = Grenache blends.\n• Châteauneuf-du-Pape: up to 13 grape varieties permitted; high alcohol.\n• Alsace: labelled by grape, mostly DRY; Riesling here is DRY (unlike Germany).\n• Sancerre/Pouilly-Fumé = Sauvignon Blanc (classic benchmark).\n• Vouvray = Chenin Blanc; can be dry, medium, or very sweet."]]},
ch9:{title:"9. France: Champagne",icon:"🇫🇷",content:[
["h1","Chapter 9 – France: Champagne and Other French Regions"],
["h2","Champagne"],
["bullet","Climate: COOL continental. Chalk soils. Traditional Method exclusively."],
["bullet","Main grapes: PINOT NOIR, PINOT MEUNIER (black), CHARDONNAY (white)."],
["h3","Champagne Styles"],
["table_h","Style|Description"],
["table_r","Non-Vintage (NV)|Blend of multiple years; house style; most common"],
["table_r","Vintage|From single outstanding year; richer, more complex"],
["table_r","Blanc de Blancs|100% Chardonnay; delicate, elegant, floral, citrus"],
["table_r","Blanc de Noirs|From black grapes only; richer, fuller body"],
["table_r","Rosé|Pink Champagne; red wine added (unique to Champagne)"],
["table_r","Prestige Cuvée|Top bottling (e.g. Dom Pérignon, Cristal)"],
["h3","Key Sub-Regions"],
["bullet","MONTAGNE DE REIMS: mainly Pinot Noir."],
["bullet","VALLÉE DE LA MARNE: mainly Pinot Meunier."],
["bullet","CÔTE DES BLANCS: mainly Chardonnay."],
["h2","Crémant"],
["bullet","Sparkling wines made in France OUTSIDE Champagne using the Traditional Method."],
["bullet","Crémant d'Alsace, Crémant de Bourgogne, Crémant de Loire, Crémant du Jura."],
["bullet","Often excellent value vs. Champagne."],
["h2","Other Important French Regions"],
["table_h","Region|Key Style/Wine|Notes"],
["table_r","Languedoc-Roussillon|Red, white, rosé|Largest region in France by volume; Mediterranean"],
["table_r","Provence|Dry pale rosé|Grenache/Cinsault/Mourvèdre; Côtes de Provence"],
["table_r","Bandol|Tannic red|Mourvèdre dominant; serious, long-lived"],
["table_r","Jura|Vin Jaune, Vin de Paille|Oxidative; very distinctive"],
["table_r","Roussillon|VDN (Banyuls, Muscat de Rivesaltes)|Sweet fortified wines"],
["note","🔑 KEY FACTS\n• Champagne = Traditional Method only; blend of PN + PM + Chardonnay.\n• Blanc de Blancs = 100% Chardonnay. Blanc de Noirs = 100% black grapes.\n• Crémant = Traditional Method from other French regions.\n• Provence = dry pale rosé. Bandol = serious Mourvèdre red.\n• Languedoc-Roussillon = France's largest volume wine region."]]},
ch10:{title:"10. Italy",icon:"🇮🇹",content:[
["h1","Chapter 10 – Wines of Italy"],
["body","Italy is the world's largest wine producer by volume, with an enormous number of indigenous grape varieties."],
["h2","Italian Wine Classification"],
["table_h","Level|Description"],
["table_r","DOC|Denominazione di Origine Controllata — controlled region"],
["table_r","DOCG|DOC + Garantita — highest quality tier; stricter rules"],
["table_r","IGT|Indicazione Geografica Tipica — flexible; includes Super Tuscans"],
["h2","Northwest Italy — Piedmont"],
["table_h","Wine|Grapes|Style"],
["table_r","Barolo|Nebbiolo|'King of Italian wines'; full body, very high tannin & acid; tar, roses, leather; ages 10–30+ yrs"],
["table_r","Barbaresco|Nebbiolo|Similar but lighter, more elegant than Barolo"],
["table_r","Barbera d'Asti|Barbera|High acid, low tannin, cherry; everyday quality"],
["table_r","Moscato d'Asti|Moscato Bianco|Low alcohol, sweet, lightly sparkling, floral/peachy"],
["h2","Northeast Italy — Veneto"],
["table_h","Wine|Key Facts"],
["table_r","Soave|Dry white; Garganega grape; light, almond, lemon"],
["table_r","Valpolicella|Light red; cherry, low tannin; Corvina grape"],
["table_r","Amarone della Valpolicella|Dried grapes (appassimento); DRY; full body, 15–17% abv; raisin, dark chocolate, tar"],
["table_r","Recioto della Valpolicella|Same appassimento but fermentation stopped early → SWEET red"],
["h2","Central Italy — Tuscany"],
["h3","Chianti & Chianti Classico"],
["bullet","Grape: SANGIOVESE dominant. Style: dry, high acidity, medium–high tannin, sour cherry, dried herbs, violets, leather."],
["bullet","Chianti CLASSICO DOCG: historic heartland; better quality. RISERVA: min 27 months. GRAN SELEZIONE: single vineyard, 30 months."],
["h3","Brunello di Montalcino (DOCG)"],
["bullet","100% Sangiovese. Very long ageing requirement (5 years). Full body, very high tannin and acid, dark cherry, leather, tobacco. Ages 20+ years."],

ch18:{title:"18. Keeping & Serving Wine",icon:"🥂",content:[
["h1","Chapter 18 – Keeping and Serving Wine"],
["h2","Storing Wine"],
["bullet","TEMPERATURE: ideally 10–15°C; constant temperature is more important than specific value."],
["bullet","HUMIDITY: 60–80% prevents corks from drying out."],
["bullet","DARKNESS: UV light causes premature ageing."],
["bullet","VIBRATION: minimise (can disturb sediment and age wine prematurely)."],
["bullet","POSITION: cork-sealed bottles stored on their side."],
["h2","Service Temperatures"],
["table_h","Wine Type|Serving Temperature"],
["table_r","Sparkling wine|6–10°C (well chilled)"],
["table_r","Light, dry white & rosé|7–10°C"],
["table_r","Full-bodied white|10–13°C"],
["table_r","Light-bodied red|13°C"],
["table_r","Medium to full-bodied red|15–18°C"],
["table_r","Fortified wine (dry, e.g. Fino)|6–10°C (chilled)"],
["table_r","Fortified wine (sweet, e.g. Port)|12–18°C"],
["h2","Glassware"],
["bullet","BOWL: large enough to swirl the wine (aerates and releases aromas)."],
["bullet","TULIP SHAPE: directs aromas to the nose."],
["bullet","FILL LEVEL: one third to maximise aroma concentration."],
["bullet","SPARKLING: tall, narrow flute or tulip glass — preserves bubbles."],
["h2","Decanting"],
["h3","Why Decant?"],
["bullet","To SEPARATE WINE FROM SEDIMENT (especially Vintage Port and old red wines)."],
["bullet","To AERATE the wine — allows it to 'open up' by exposing it to oxygen, softening tannins and releasing aromas."],
["h3","Which Wines Benefit?"],
["bullet","Vintage Port: always decant to remove sediment."],
["bullet","Young, tannic reds: decant to soften tannins."],
["bullet","Old reds: careful decanting to remove sediment; do not over-decant (aromas can fade)."],
["h2","Closures"],
["table_h","Closure|Pros|Cons"],
["table_r","Natural Cork|Traditional; allows micro-oxygenation; prestige|Risk of TCA (cork taint)"],
["table_r","Screwcap (Stelvin)|Consistent; no cork taint; good for fresh wines|Can cause reduction; perceived as lower quality"],
["table_r","Synthetic Cork|No cork taint; inexpensive|Variable oxygen transmission"],
["table_r","Glass Stopper|Elegant; reusable; no contamination|Expensive; less common"],
["h2","Wine & Food Matching"],
["bullet","MATCH WEIGHT: light food → light wine; rich food → full-bodied wine."],
["bullet","MIRROR FLAVOURS: citrusy wine → citrus/fish dishes."],
["bullet","CONTRAST: rich, fatty food → high-acidity wine (cuts through fat)."],
["bullet","REGIONAL PAIRING: wines and foods from the same region often work well together."],
["bullet","TANNIN + PROTEIN: tannic reds soften alongside red meat (protein neutralises tannin)."],
["bullet","SWEET WINE: should be at least as sweet as the dessert."],
["note","🔑 KEY SERVICE FACTS\n• Store wine at 10–15°C, on its side, in darkness.\n• Reds served at 15–18°C; whites at 7–13°C; Fino Sherry chilled like white wine.\n• Vintage Port = always decant (sediment).\n• Young tannic reds → decant to open up.\n• Screwcap = no cork taint but can cause reduction.\n• Tannic red wine + red meat = classic pairing (protein softens tannin)."]]},
};

// DRAWER
// ══════════════════════════════════════════════════════
function toggleDrawer() {
  const drawer = document.getElementById('drawer');
  const overlay = document.getElementById('overlay');
  const isOpen = drawer.classList.contains('open');
  if (isOpen) {
    drawer.classList.remove('open');
    overlay.classList.remove('open');
  } else {
    drawer.classList.add('open');
    overlay.classList.add('open');
  }
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// Build drawer nav
(function buildNav() {
  const nav = document.getElementById('drawer-nav');
  const divider = nav.querySelector('.drawer-divider');
  Object.entries(CHAPTERS).forEach(([key, ch]) => {
    if (key === 'intro') return;
    const btn = document.createElement('button');
    btn.className = 'ch-btn';
    btn.id = 'btn-' + key;
    btn.innerHTML = `<span class="icon">${ch.icon}</span> ${ch.title}`;
    btn.onclick = () => { showChapter(key); closeDrawer(); };
    nav.insertBefore(btn, divider);
  });
})();

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function renderContent(content) {
  let html = '';
  let tableRows = [], tableHeaders = null;

  function flushTable() {
    if (!tableHeaders) return;
    html += '<div class="table-wrap"><table class="ch-table"><thead><tr>';
    tableHeaders.forEach(h => html += `<th>${h}</th>`);
    html += '</tr></thead><tbody>';
    tableRows.forEach(row => {
      html += '<tr>';
      row.forEach(c => html += `<td>${c}</td>`);
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    tableRows = []; tableHeaders = null;
  }

  content.forEach(([type, text]) => {
    if (type !== 'table_h' && type !== 'table_r') flushTable();
    switch(type) {
      case 'h1': html += `<h1 class="ch-h1">${text}</h1>`; break;
      case 'h2': html += `<h2 class="ch-h2">${text}</h2>`; break;
      case 'h3': html += `<h3 class="ch-h3">${text}</h3>`; break;
      case 'body': html += `<p class="ch-body">${text}</p>`; break;
      case 'bullet': html += `<div class="ch-bullet"><span class="dot">•</span><span>${text}</span></div>`; break;
      case 'note': html += `<div class="ch-note">${text}</div>`; break;
      case 'table_h':
        tableHeaders = text.split('|');
        tableRows = [];
        break;
      case 'table_r':
        tableRows.push(text.split('|'));
        break;
    }
  });
  flushTable();
  return html;
}

// VIEWS

let currentView = 'home';

function setActiveBtn(id) {
  document.querySelectorAll('.ch-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + id);
  if (btn) btn.classList.add('active');
}

function showHome() {
  currentView = 'home';
  document.getElementById('home-view').style.display = '';
  document.getElementById('chapter-view').style.display = 'none';
  document.getElementById('index-view').style.display = 'none';
  document.getElementById('header-title').textContent = '🍷 WSET Level 2';
  setActiveBtn('home');
  window.scrollTo(0,0);

  const intro = CHAPTERS.intro;
  let html = '<div class="home-header">';
  html += '<h1>🍷 WSET<br>Level 2</h1>';
  html += '<p>Interactive Study Guide — tap a chapter to begin.</p></div>';
  html += '<button class="index-bar-btn" onclick="showIndex()"><span>📑</span> A – Z Index</button>';
  html += '<div class="home-grid">';
  Object.entries(CHAPTERS).forEach(([key, ch]) => {
    if (key === 'intro') return;
    const num = ch.title.match(/^(\d+)\.?/);
    const numStr = num ? `Ch ${num[1]}` : '';
    const shortTitle = ch.title.replace(/^\d+\.\s*/, '');
    html += `<div class="home-card" onclick="showChapter('${key}')">
      <div class="hc-icon">${ch.icon}</div>
      <div class="hc-num">${numStr}</div>
      <div class="hc-title">${shortTitle}</div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('home-view').innerHTML = html;
}

function showChapter(key) {
  currentView = key;
  const ch = CHAPTERS[key];
  if (!ch) return;

  document.getElementById('home-view').style.display = 'none';
  document.getElementById('chapter-view').style.display = '';
  document.getElementById('index-view').style.display = 'none';
  document.getElementById('header-title').textContent = ch.icon + ' ' + ch.title;
  setActiveBtn(key);
  window.scrollTo(0,0);

  const view = document.getElementById('chapter-view');
  view.innerHTML = `<div class="fade-in">${renderContent(ch.content)}</div>`;
}

function showIndex() {
  currentView = 'index';
  document.getElementById('home-view').style.display = 'none';
  document.getElementById('chapter-view').style.display = 'none';
  document.getElementById('index-view').style.display = '';
  document.getElementById('header-title').textContent = '📑 A–Z Index';
  setActiveBtn('index');
  window.scrollTo(0,0);
  renderIndexList(INDEX_TERMS);
}

function renderIndexList(terms) {
  const list = document.getElementById('index-list');
  list.innerHTML = terms.map(item => {
    const ch = CHAPTERS[item.ch];
    const dest = ch ? ch.title : item.ch;
    return `<div class="idx-item" onclick="showChapter('${item.ch}')">
      <span>${item.term}</span>
      <span class="idx-dest">${ch ? ch.icon : ''} ${dest}</span>
    </div>`;
  }).join('');
}

function filterIndex() {
  const q = document.getElementById('index-filter').value.toLowerCase();
  const filtered = INDEX_TERMS.filter(t => t.term.toLowerCase().includes(q));
  renderIndexList(filtered);
}

function clearIndexFilter() {
  document.getElementById('index-filter').value = '';
  renderIndexList(INDEX_TERMS);
}

// ══════════════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════════════
function openSearch() {
  document.getElementById('search-overlay').classList.add('open');
  setTimeout(() => document.getElementById('search-input').focus(), 100);
}

function closeSearch() {
  document.getElementById('search-overlay').classList.remove('open');
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').innerHTML = '<p id="search-placeholder">Type to search all chapters…</p>';
}

function doSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const container = document.getElementById('search-results');
  if (q.length < 2) {
    container.innerHTML = '<p id="search-placeholder">Type to search all chapters…</p>';
    return;
  }
  const results = [];

  // Search index terms
  INDEX_TERMS.forEach(item => {
    if (item.term.toLowerCase().includes(q)) {
      const ch = CHAPTERS[item.ch];
      results.push({ name: item.term, dest: item.ch, label: ch ? `${ch.icon} ${ch.title}` : item.ch, score: 2 });
    }
  });

  // Search chapter content
  Object.entries(CHAPTERS).forEach(([key, ch]) => {
    let found = false;
    ch.content.forEach(([type, text]) => {
      if (!found && text.toLowerCase().includes(q)) {
        found = true;
        if (!results.find(r => r.dest === key && r.name === ch.title)) {
          results.push({ name: ch.title, dest: key, label: `${ch.icon} ${ch.title}`, score: 1 });
        }
      }
    });
  });

  // Deduplicate & sort
  const seen = new Set();
  const unique = results.filter(r => {
    const k = r.name + r.dest;
    if (seen.has(k)) return false;
    seen.add(k); return true;
  }).sort((a,b) => b.score - a.score);

  if (unique.length === 0) {
    container.innerHTML = '<p style="color:#aaa;text-align:center;margin-top:32px;font-family:\'Source Sans 3\',sans-serif;">No results found.</p>';
    return;
  }

  container.innerHTML = unique.slice(0,30).map(r =>
    `<div class="srch-item" onclick="showChapter('${r.dest}'); closeSearch()">
      <span class="srch-name">${r.name}</span>
      <span class="srch-dest">${r.label}</span>
    </div>`
  ).join('');
}

// Handle Enter key dismissing search keyboard on mobile
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') e.target.blur();
});

// FONT SIZE
// ══════════════════════════════════════════════════════
const FONT_SIZES = [13, 14, 15, 16, 18, 20, 22];
const FONT_DEFAULT = 3; // index into FONT_SIZES → 16px
let fontIndex = (() => {
  try { return parseInt(localStorage.getItem('wset_font') ?? FONT_DEFAULT, 10); }
  catch { return FONT_DEFAULT; }
})();

function applyFontSize() {
  fontIndex = Math.max(0, Math.min(FONT_SIZES.length - 1, fontIndex));
  document.documentElement.style.fontSize = FONT_SIZES[fontIndex] + 'px';
  // Dim whichever limit button is hit
  document.querySelectorAll('.font-btn').forEach((btn, i) => {
    const atLimit = (i === 0 && fontIndex === 0) || (i === 1 && fontIndex === FONT_SIZES.length - 1);
    btn.style.opacity = atLimit ? '0.35' : '1';
  });
  try { localStorage.setItem('wset_font', fontIndex); } catch {}
}

function changeFontSize(dir) {
  fontIndex += dir;
  applyFontSize();
}

applyFontSize(); // apply saved preference on load
